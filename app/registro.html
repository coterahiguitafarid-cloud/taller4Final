<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D1 Supermercados - Registro</title>
  <link href="../assets/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.4/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body class="pt-5 bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">D1</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="admin.html">Admin</a></li>
          <li class="nav-item"><a class="nav-link" href="cliente.html">Cliente</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link active" aria-current="page" href="registro.html">Registro</a></li>
          <li class="nav-item"><a class="nav-link" href="recuperar.html">Recuperar</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-8">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h2 class="mb-4 text-center">Registro de Usuario</h2>
              <form>
                <div class="row g-3">
                  <div class="col-md-6">
                    <div class="form-floating">
                      <input type="text" class="form-control" id="nombre" placeholder="Nombre" />
                      <label for="nombre">Nombre</label>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-floating">
                      <input type="text" class="form-control" id="apellidos" placeholder="Apellidos" />
                      <label for="apellidos">Apellidos</label>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-floating">
                      <input type="email" class="form-control" id="correo" placeholder="correo@dominio.com" />
                      <label for="correo">Correo electrónico</label>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="form-floating">
                      <input type="tel" class="form-control" id="telefono" placeholder="555 123 4567" />
                      <label for="telefono">Teléfono</label>
                    </div>
                  </div>
                  <div class="col-12">
                    <div class="form-floating">
                      <input type="password" class="form-control" id="pass" placeholder="Contraseña" />
                      <label for="pass">Contraseña</label>
                    </div>
                  </div>
                  <div class="col-12">
                    <div class="form-floating">
                      <input type="password" class="form-control" id="confirmar" placeholder="Confirmar contraseña" />
                      <label for="confirmar">Confirmar contraseña</label>
                    </div>
                  </div>
                </div>
                <button class="btn btn-danger w-100 mt-4" type="submit">Crear cuenta</button>
                <div class="text-center mt-3">
                  <span>¿Ya tienes cuenta?</span> <a href="login.html">Ingresar</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="../assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>
